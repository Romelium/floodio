syntax = "proto3";

package floodio;

message Coordinate {
  double latitude = 1;
  double longitude = 2;
}

message AreaMarker {
  string id = 1;
  repeated Coordinate coordinates = 2;
  string type = 3;
  string description = 4;
  int64 timestamp = 5;
  string sender_id = 6;
  string signature = 7;
  int32 trust_tier = 8;
  int64 expires_at = 9;
}

message HazardMarker {
  string id = 1;
  double latitude = 2;
  double longitude = 3;
  string type = 4;
  string description = 5;
  int64 timestamp = 6;
  string sender_id = 7;
  string signature = 8;
  int32 trust_tier = 9;
  string image_id = 10;
  int64 expires_at = 11;
}

message NewsItem {
  string id = 1;
  string title = 2;
  string content = 3;
  int64 timestamp = 4;
  string sender_id = 5;
  string signature = 6;
  int32 trust_tier = 7;
  int64 expires_at = 8;
}

message UserProfile {
  string public_key = 1;
  string name = 2;
  string contact_info = 3;
  int64 timestamp = 4;
  string signature = 5;
}

message DeletedItem {
  string id = 1;
  int64 timestamp = 2;
}

message TrustDelegation {
  string id = 1;
  string delegator_public_key = 2;
  string delegatee_public_key = 3;
  int64 timestamp = 4;
  string signature = 5;
}

message SyncPayload {
  repeated HazardMarker markers = 1;
  repeated NewsItem news = 2;
  repeated UserProfile profiles = 3;
  repeated DeletedItem deleted_items = 4;
  repeated AreaMarker areas = 5;
  repeated TrustDelegation delegations = 6;
}
